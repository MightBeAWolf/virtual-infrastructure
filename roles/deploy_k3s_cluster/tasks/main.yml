---

- name: Use terraform from the control node
  delegate_to: localhost
  block:
    - name: Create local terraform project directory
      ansible.builtin.file:
        path: "{{ lookup('ansible.builtin.env', 'HOME') }}/.local/state/terraform/{{ ansible_host }}/{{ role_path | basename }}"
        mode: '0700'
        state: directory

    - name: Sync the terraform project configuration files
      ansible.builtin.copy:
        src: "terraform/"
        dest: "{{ lookup('ansible.builtin.env', 'HOME') }}/.local/state/terraform/{{ ansible_host }}/{{ role_path | basename }}"
        mode: 'preserve'

    - name: Apply terraform with the project run script
      ansible.builtin.command:
        chdir: "{{ lookup('ansible.builtin.env', 'HOME') }}/.local/state/terraform/{{ ansible_host }}/{{ role_path | basename }}"
        argv:
          - "./run.sh"
          - "apply"
          - "-var=pm_host={{ ansible_host }}{{ deploy_k3s_cluster_proxmox_port }}"
          - "--auto-approve"
      register: terraform_apply
      changed_when: terraform_apply.rc == 0
